<!doctype html>
<!--
  KESTREL — deck 3
  A zero-asset proof: every texture is painted onto <canvas> at load time,
  every mesh is built from three.js primitives, every sound is synthesized
  in WebAudio. No image files, no model files, no audio files.
  The only network request is the three.js library itself.

  The eight weapons are ported from TRENCHFALL (src/main.js) — the same
  procedurally joined viewmodels, stats, and layered gunshot synthesis.
-->

<div id="vignette"></div>
<div id="hud"><b>KESTREL</b> · deck 3 access corridor<br>
<span class="sub">click to walk &nbsp;·&nbsp; wasd + mouse · space jump · shift sprint · 1-8 weapons · r reload &nbsp;·&nbsp; zero asset files</span></div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const TAU = Math.PI * 2;

/* ---------------------------------------------------------------- rng */
let _s = 1337;
const rnd = () => { _s |= 0; _s = _s + 0x6D2B79F5 | 0;
  let t = Math.imul(_s ^ _s >>> 15, 1 | _s);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296; };
const rr = (a, b) => a + rnd() * (b - a);
const rand = (a, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;

/* ------------------------------------ value noise (TRENCHFALL helpers) */
const HSALT = 7;
function hash(ix, iz) { let n = ix * 374761393 + iz * 668265263 + HSALT | 0;
  n = (n ^ (n >> 13)) * 1274126177; return ((n ^ (n >> 16)) >>> 0) / 4294967295; }
function smoothNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y), fx = x - ix, fy = y - iy;
  const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
  const a = hash(ix, iy), b = hash(ix + 1, iy), c = hash(ix, iy + 1), d = hash(ix + 1, iy + 1);
  return a + (b - a) * sx + (c - a) * sy + (a - b - c + d) * sx * sy;
}
function fbm2(x, y, oct = 4) {
  let v = 0, a = .5, fx = x, fy = y;
  for (let o = 0; o < oct; o++) { v += a * smoothNoise(fx, fy); fx = fx * 2.07 + 13.1; fy = fy * 2.07 + 7.7; a *= .5; }
  return v;
}

/* ------------------------------------------------------- canvas tools */
function cv(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return [c, c.getContext('2d')];
}
function speckle(x, w, h, n, alpha, light) {
  for (let i = 0; i < n; i++) {
    x.fillStyle = `rgba(${light ? '255,255,255' : '0,0,0'},${alpha * rr(.4, 1)})`;
    x.fillRect(rnd() * w, rnd() * h, rr(1, 2.4), rr(1, 2.4));
  }
}
function scratches(x, w, h, n, len) {
  for (let i = 0; i < n; i++) {
    const px = rnd() * w, py = rnd() * h, a = rnd() * Math.PI, l = rr(len * .3, len);
    x.strokeStyle = rnd() < .5 ? `rgba(255,255,255,${rr(.04, .14)})` : `rgba(20,16,12,${rr(.05, .16)})`;
    x.lineWidth = rr(.6, 1.6);
    x.beginPath();
    x.moveTo(px, py);
    x.lineTo(px + Math.cos(a) * l, py + Math.sin(a) * l);
    x.stroke();
  }
}
function grimeBlobs(x, w, h, n, rMax, color, aMax) {
  for (let i = 0; i < n; i++) {
    const px = rnd() * w, py = rnd() * h, r = rr(rMax * .25, rMax);
    const g = x.createRadialGradient(px, py, 0, px, py, r);
    g.addColorStop(0, color.replace('A', (aMax * rr(.4, 1)).toFixed(3)));
    g.addColorStop(1, color.replace('A', '0'));
    x.fillStyle = g;
    x.fillRect(px - r, py - r, r * 2, r * 2);
  }
}
function chip(x, px, py, r, fill, rim) {
  x.beginPath();
  const n = 7 + (rnd() * 4 | 0);
  for (let i = 0; i <= n; i++) {
    const a = i / n * TAU, rad = r * rr(.55, 1.25);
    const X = px + Math.cos(a) * rad, Y = py + Math.sin(a) * rad * .8;
    i ? x.lineTo(X, Y) : x.moveTo(X, Y);
  }
  x.closePath();
  x.fillStyle = fill; x.fill();
  x.strokeStyle = rim; x.lineWidth = 1.4; x.stroke();
}
function normalFromHeight(src, strength) {
  const w = src.width, h = src.height;
  const d = src.getContext('2d').getImageData(0, 0, w, h).data;
  const [out, ox] = cv(w, h);
  const img = ox.createImageData(w, h);
  const H = (X, Y) => d[(((Y + h) % h) * w + ((X + w) % w)) * 4] / 255;
  for (let y = 0; y < h; y++) for (let X = 0; X < w; X++) {
    const dx = (H(X - 1, y) - H(X + 1, y)) * strength;
    const dy = (H(X, y + 1) - H(X, y - 1)) * strength;
    const inv = 1 / Math.hypot(dx, dy, 1);
    const i = (y * w + X) * 4;
    img.data[i] = (dx * inv * .5 + .5) * 255;
    img.data[i + 1] = (dy * inv * .5 + .5) * 255;
    img.data[i + 2] = (inv * .5 + .5) * 255;
    img.data[i + 3] = 255;
  }
  ox.putImageData(img, 0, 0);
  return out;
}
function tex(canvas, srgb) {
  const t = new THREE.CanvasTexture(canvas);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  if (srgb) t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

/* =================================================== WALL MAPS (8m x 3.15m) */
const PXM = 256;
const WW = 8 * PXM, WH = Math.round(3.15 * PXM);
function wallMaps() {
  const [c, x] = cv(WW, WH), [hc, hx] = cv(WW, WH), [rc, rx] = cv(WW, WH);
  const Y = m => WH - m * PXM;
  hx.fillStyle = '#808080'; hx.fillRect(0, 0, WW, WH);
  rx.fillStyle = '#9e9e9e'; rx.fillRect(0, 0, WW, WH);
  x.fillStyle = '#14130f'; x.fillRect(0, 0, WW, WH);
  const rows = [
    [0.00, 0.16, 8.0, 0, 'base'],
    [0.16, 1.08, 1.0, 0, 'cream'],
    [1.08, 1.62, 1.0, .5, 'orange'],
    [1.62, 3.15, 2.0, 0, 'cream'],
  ];
  const seam = 5;
  for (const [b, t, pitch, off, kind] of rows) {
    for (let px = -off; px < 8; px += pitch) {
      const x0 = px * PXM + seam, x1 = Math.min((px + pitch) * PXM - seam, WW);
      const y0 = Y(t) + seam, y1 = Y(b) - seam;
      const w = x1 - x0, h = y1 - y0;
      if (w <= 0) continue;
      if (kind === 'base') {
        x.fillStyle = '#23211d'; x.fillRect(x0, y0, w, h);
        rx.fillStyle = '#6a6a6a'; rx.fillRect(x0, y0, w, h);
        continue;
      }
      const orange = kind === 'orange';
      const v = rr(-7, 7) | 0;
      x.fillStyle = orange
        ? `rgb(${198 + v},${104 + (v >> 1)},${40})`
        : `rgb(${221 + v},${213 + v},${198 + v})`;
      x.fillRect(x0, y0, w, h);
      const g = x.createLinearGradient(0, y0, 0, y1);
      g.addColorStop(0, 'rgba(255,255,255,.10)');
      g.addColorStop(.5, 'rgba(255,255,255,0)');
      g.addColorStop(1, 'rgba(0,0,0,.14)');
      x.fillStyle = g; x.fillRect(x0, y0, w, h);
      x.strokeStyle = 'rgba(255,255,255,.30)'; x.lineWidth = 2;
      x.strokeRect(x0 + 1.5, y0 + 1.5, w - 3, h - 3);
      x.strokeStyle = 'rgba(0,0,0,.32)';
      x.strokeRect(x0 + 4, y0 + 4, w - 8, h - 8);
      hx.fillStyle = '#b8b8b8'; hx.fillRect(x0, y0, w, h);
      hx.strokeStyle = '#8a8a8a'; hx.lineWidth = 6;
      hx.strokeRect(x0 + 3, y0 + 3, w - 6, h - 6);
      rx.fillStyle = orange ? '#888888' : '#a2a2a2';
      rx.fillRect(x0, y0, w, h);
      x.fillStyle = 'rgba(30,26,22,.8)';
      for (const [sx, sy] of [[x0 + 12, y0 + 12], [x1 - 12, y0 + 12], [x0 + 12, y1 - 12], [x1 - 12, y1 - 12]]) {
        x.beginPath(); x.arc(sx, sy, 3.2, 0, 7); x.fill();
      }
      if (orange) {
        const nChips = 6 + (rnd() * 9 | 0);
        for (let i = 0; i < nChips; i++) {
          const edge = rnd() < .65;
          const cxp = x0 + (edge ? (rnd() < .5 ? rr(0, w * .18) : w - rr(0, w * .18)) : rnd() * w);
          const cyp = y0 + rnd() * h;
          const r = rr(5, 26);
          chip(x, cxp, cyp, r, `rgb(${228 + (rnd() * 8 | 0)},${222},${208})`, 'rgba(90,40,10,.55)');
          chip(hx, cxp, cyp, r, '#a0a0a0', '#888');
          chip(rx, cxp, cyp, r, '#c8c8c8', '#c8c8c8');
        }
      }
    }
  }
  scratches(x, WW, WH, 90, 130);
  grimeBlobs(x, WW, WH, 50, 120, 'rgba(35,28,20,A)', .13);
  const gb = x.createLinearGradient(0, Y(0), 0, Y(.7));
  gb.addColorStop(0, 'rgba(20,16,10,.30)'); gb.addColorStop(1, 'rgba(20,16,10,0)');
  x.fillStyle = gb; x.fillRect(0, Y(.7), WW, Y(0) - Y(.7));
  for (let i = 0; i < 26; i++) {
    const px = rnd() * WW, py = rnd() * WH * .7, l = rr(20, 120);
    x.strokeStyle = `rgba(40,32,22,${rr(.05, .15)})`; x.lineWidth = rr(1, 3);
    x.beginPath(); x.moveTo(px, py); x.lineTo(px + rr(-3, 3), py + l); x.stroke();
  }
  speckle(x, WW, WH, 9000, .05);
  speckle(rx, WW, WH, 7000, .10);
  speckle(rx, WW, WH, 7000, .10, true);
  return {
    map: tex(c, true),
    normalMap: tex(normalFromHeight(hc, 2.6)),
    roughnessMap: tex(rc),
  };
}

/* ============================================== CEILING MAPS (4m x 4m) */
function ceilingMaps() {
  const S = 1024, [c, x] = cv(S, S), [hc, hx] = cv(S, S);
  x.fillStyle = '#191a1c'; x.fillRect(0, 0, S, S);
  hx.fillStyle = '#808080'; hx.fillRect(0, 0, S, S);
  const P = S / 4, seam = 4;
  for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) {
    const x0 = i * P + seam, y0 = j * P + seam, w = P - seam * 2;
    const v = rr(-5, 5) | 0;
    x.fillStyle = `rgb(${224 + v},${222 + v},${214 + v})`;
    x.fillRect(x0, y0, w, w);
    x.strokeStyle = 'rgba(0,0,0,.25)'; x.lineWidth = 3;
    x.strokeRect(x0 + 2, y0 + 2, w - 4, w - 4);
    hx.fillStyle = '#b0b0b0'; hx.fillRect(x0, y0, w, w);
    hx.strokeStyle = '#909090'; hx.lineWidth = 5;
    hx.strokeRect(x0 + 2, y0 + 2, w - 4, w - 4);
  }
  grimeBlobs(x, S, S, 24, 90, 'rgba(30,26,20,A)', .10);
  speckle(x, S, S, 3000, .04);
  return { map: tex(c, true), normalMap: tex(normalFromHeight(hc, 2)) };
}

/* ================================================ FLOOR GRATE (1.5m sq) */
function grateMaps() {
  const S = 512, [c, x] = cv(S, S), [hc, hx] = cv(S, S), [rc, rx] = cv(S, S);
  x.fillStyle = '#33363b'; x.fillRect(0, 0, S, S);
  hx.fillStyle = '#c0c0c0'; hx.fillRect(0, 0, S, S);
  rx.fillStyle = '#7a7a7a'; rx.fillRect(0, 0, S, S);
  speckle(x, S, S, 2600, .07);
  speckle(x, S, S, 1200, .05, true);
  const sw = 44, sh = 13, gx = 14, gy = 13;
  for (let row = 0, y = 8; y < S - sh; y += sh + gy, row++) {
    for (let px = row % 2 ? -(sw >> 1) : 8; px < S; px += sw + gx) {
      x.fillStyle = '#0a0b0d';
      x.beginPath(); x.roundRect(px, y, sw, sh, 5); x.fill();
      x.strokeStyle = 'rgba(150,160,170,.35)'; x.lineWidth = 1.5;
      x.beginPath(); x.moveTo(px + 4, y + sh - 1.5); x.lineTo(px + sw - 4, y + sh - 1.5); x.stroke();
      hx.fillStyle = '#202020';
      hx.beginPath(); hx.roundRect(px, y, sw, sh, 5); hx.fill();
      rx.fillStyle = '#cccccc';
      rx.beginPath(); rx.roundRect(px, y, sw, sh, 5); rx.fill();
    }
  }
  scratches(x, S, S, 50, 70);
  return {
    map: tex(c, true),
    normalMap: tex(normalFromHeight(hc, 3)),
    roughnessMap: tex(rc),
  };
}

/* ============================================== SIDE FLOOR PLATE (1m sq) */
function plateMaps() {
  const S = 512, [c, x] = cv(S, S), [hc, hx] = cv(S, S);
  x.fillStyle = '#3b3e44'; x.fillRect(0, 0, S, S);
  hx.fillStyle = '#a0a0a0'; hx.fillRect(0, 0, S, S);
  const P = S / 2;
  for (let i = 0; i < 2; i++) for (let j = 0; j < 2; j++) {
    const v = rr(-4, 4) | 0;
    x.fillStyle = `rgb(${59 + v},${62 + v},${68 + v})`;
    x.fillRect(i * P + 3, j * P + 3, P - 6, P - 6);
    x.strokeStyle = 'rgba(0,0,0,.5)'; x.lineWidth = 4;
    x.strokeRect(i * P + 2, j * P + 2, P - 4, P - 4);
    hx.strokeStyle = '#707070'; hx.lineWidth = 6;
    hx.strokeRect(i * P + 2, j * P + 2, P - 4, P - 4);
  }
  for (let i = 0; i < 120; i++) {
    const px = rnd() * S, py = rnd() * S, l = rr(20, 90);
    x.strokeStyle = `rgba(${rnd() < .5 ? '140,148,158' : '18,18,20'},${rr(.04, .1)})`;
    x.lineWidth = rr(.8, 2.4);
    x.beginPath(); x.moveTo(px, py); x.lineTo(px, py + l); x.stroke();
  }
  speckle(x, S, S, 3500, .06);
  return { map: tex(c, true), normalMap: tex(normalFromHeight(hc, 2)) };
}

/* ============================================ ORANGE PAINT (rings/frames) */
function orangePaintMaps() {
  const W2 = 1024, H2 = 256, [c, x] = cv(W2, H2), [rc, rx] = cv(W2, H2);
  x.fillStyle = '#c06426'; x.fillRect(0, 0, W2, H2);
  rx.fillStyle = '#828282'; rx.fillRect(0, 0, W2, H2);
  grimeBlobs(x, W2, H2, 30, 90, 'rgba(255,160,80,A)', .12);
  grimeBlobs(x, W2, H2, 30, 90, 'rgba(60,25,5,A)', .15);
  for (let i = 0; i < 8; i++) {
    const px = i * W2 / 8;
    x.fillStyle = 'rgba(15,12,10,.9)'; x.fillRect(px - 2, 0, 5, H2);
    x.fillStyle = 'rgba(255,200,160,.25)'; x.fillRect(px + 3, 0, 2, H2);
  }
  for (let i = 0; i < 26; i++) {
    const px = rnd() * W2, py = rnd() * H2, r = rr(4, 16);
    chip(x, px, py, r, '#ded8ca', 'rgba(80,35,8,.6)');
    chip(rx, px, py, r, '#c4c4c4', '#c4c4c4');
  }
  scratches(x, W2, H2, 36, 60);
  speckle(x, W2, H2, 1500, .05);
  return { map: tex(c, true), roughnessMap: tex(rc) };
}

/* ====================================================== TILES (alcove) */
function tileMaps() {
  const S = 512, [c, x] = cv(S, S), [hc, hx] = cv(S, S);
  x.fillStyle = '#1c1b18'; x.fillRect(0, 0, S, S);
  hx.fillStyle = '#808080'; hx.fillRect(0, 0, S, S);
  const P = S / 4, g = 4;
  for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) {
    const v = rr(-6, 6) | 0;
    x.fillStyle = `rgb(${225 + v},${221 + v},${210 + v})`;
    x.fillRect(i * P + g, j * P + g, P - g * 2, P - g * 2);
    const gr = x.createLinearGradient(i * P, j * P, (i + 1) * P, (j + 1) * P);
    gr.addColorStop(0, 'rgba(255,255,255,.12)'); gr.addColorStop(1, 'rgba(0,0,0,.10)');
    x.fillStyle = gr; x.fillRect(i * P + g, j * P + g, P - g * 2, P - g * 2);
    hx.fillStyle = '#b4b4b4'; hx.fillRect(i * P + g, j * P + g, P - g * 2, P - g * 2);
  }
  grimeBlobs(x, S, S, 14, 70, 'rgba(40,34,26,A)', .12);
  speckle(x, S, S, 1500, .04);
  return { map: tex(c, true), normalMap: tex(normalFromHeight(hc, 2.4)) };
}

/* ========================================================== STARFIELD */
function starCanvas() {
  const S = 1024, [c, x] = cv(S, S);
  x.fillStyle = '#01020a'; x.fillRect(0, 0, S, S);
  grimeBlobs(x, S, S, 5, 320, 'rgba(30,50,110,A)', .25);
  grimeBlobs(x, S, S, 4, 220, 'rgba(20,90,100,A)', .18);
  grimeBlobs(x, S, S, 3, 180, 'rgba(120,60,30,A)', .10);
  for (let i = 0; i < 420; i++) {
    const px = rnd() * S, py = rnd() * S, r = Math.pow(rnd(), 2.4) * 1.7 + .3;
    const tint = rnd();
    x.fillStyle = tint < .12 ? `rgba(170,200,255,${rr(.5, 1)})`
      : tint < .2 ? `rgba(255,210,170,${rr(.5, 1)})`
      : `rgba(255,255,255,${rr(.3, 1)})`;
    x.beginPath(); x.arc(px, py, r, 0, 7); x.fill();
    if (r > 1.3) {
      x.fillStyle = 'rgba(255,255,255,.18)';
      x.fillRect(px - r * 4, py - .5, r * 8, 1);
      x.fillRect(px - .5, py - r * 4, 1, r * 8);
    }
  }
  return tex(c, true);
}

/* ======================================== WOOD + GUNMETAL (TRENCHFALL) */
const woodTexK = (() => {
  const [c, g] = cv(256, 256);
  g.fillStyle = '#bba776'; g.fillRect(0, 0, 256, 256);
  for (let y = 0; y < 256; y++) {
    const w = fbm2(3, y * .05, 3);
    g.fillStyle = `rgba(70,52,30,${.10 + w * .25})`; g.fillRect(0, y, 256, 1);
  }
  for (let i = 0; i < 9; i++) { g.fillStyle = 'rgba(40,30,18,.55)'; g.fillRect(0, i * 28 + (i * 7) % 9, 256, 2); }
  for (let i = 0; i < 26; i++) {
    const x = rnd() * 256, y = rnd() * 256;
    const rg = g.createRadialGradient(x, y, 1, x, y, 7);
    rg.addColorStop(0, 'rgba(50,36,20,.8)'); rg.addColorStop(1, 'rgba(50,36,20,0)');
    g.fillStyle = rg; g.beginPath(); g.arc(x, y, 7, 0, TAU); g.fill();
  }
  const t = tex(c, true); t.anisotropy = 8;
  return t;
})();
const gunTexK = (() => { // brushed, parkerized: machined steel is never one flat tone
  const [c, g2] = cv(128, 128);
  const img = g2.createImageData(128, 128);
  for (let y = 0; y < 128; y++) for (let x = 0; x < 128; x++) {
    const i = (y * 128 + x) * 4;
    let v = 195 + Math.sin(x * .9 + hash(0, y) * 9) * 14
          + (hash(x * 3, y * 7) - .5) * 36
          + fbm2(x * .06 + 50, y * .06 + 9, 3) * 44 - 22;
    img.data[i] = v; img.data[i + 1] = v; img.data[i + 2] = v * 1.02; img.data[i + 3] = 255;
  }
  g2.putImageData(img, 0, 0);
  const t = tex(c, true); t.anisotropy = 8;
  return t;
})();

/* a wall strip with UVs in metres so one shared material tiles seamlessly
   across separate segments (u maps 8m, v maps full height from vStart) */
function wallSeg(len, h, uStartM, vStartM) {
  const g = new THREE.PlaneGeometry(len, h);
  const uv = g.attributes.uv;
  for (let i = 0; i < uv.count; i++) {
    uv.setX(i, (uStartM + uv.getX(i) * len) / 8);
    uv.setY(i, ((vStartM ?? 0) + uv.getY(i) * h) / 3.15);
  }
  const m = new THREE.Mesh(g, wallMat);
  scene.add(m);
  return pushCol(m);
}
function plane(w, h, mat, px, py, pz, ry, rx_) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  m.position.set(px, py, pz);
  if (ry) m.rotation.y = ry;
  if (rx_) m.rotation.x = rx_;
  scene.add(m);
  return pushCol(m);
}
function floorPatch(w, d, px, pz) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), plateMat);
  m.rotation.x = -Math.PI / 2;
  m.position.set(px, 0, pz);
  scene.add(m);

}
function ceilPatch(w, d, px, pz) {

}

function roomMat(src, ru, rv) {

    m[k] = m[k].clone();
    m[k].needsUpdate = true;
    m[k].repeat.set(ru, rv);

  return m;

function roomShell(R, doorWall, doorAt, doorW, doorTop, uPhase) {
  const wRoom = R.x1 - R.x0, dRoom = R.z1 - R.z0;

  const ce = new THREE.Mesh(new THREE.PlaneGeometry(wRoom, dRoom),
    roomMat(ceilMat, wRoom / 4, dRoom / 4));
  ce.rotation.x = Math.PI / 2; ce.position.set(cx, H, czr);
  scene.add(ce); pushCol(ce);
  // four walls; the one named in doorWall gets a gap
  const sides = [
    { id: 'N', len: wRoom, px: cx, pz: R.z0, ry: 0, axis: 'x', a0: R.x0 },
    { id: 'S', len: wRoom, px: cx, pz: R.z1, ry: Math.PI, axis: 'x', a0: R.x0 },
    { id: 'W', len: dRoom, px: R.x0, pz: czr, ry: Math.PI / 2, axis: 'z', a0: R.z0 },
    { id: 'E', len: dRoom, px: R.x1, pz: czr, ry: -Math.PI / 2, axis: 'z', a0: R.z0 },
  ];
  for (const s of sides) {
    if (s.id === doorWall) {
      const g0 = doorAt - doorW / 2, g1 = doorAt + doorW / 2;
      const runs = [[s.a0, g0], [g1, s.a0 + s.len]];
      for (const [a, b] of runs) {
        if (b - a < .01) continue;
        const m = wallSeg(b - a, H, uPhase + (a - s.a0));
        const mid = (a + b) / 2;
        if (s.axis === 'x') m.position.set(mid, H / 2, s.pz);
        else m.position.set(s.px, H / 2, mid);
        m.rotation.y = s.ry;
      }
      const lin = wallSeg(doorW, H - doorTop, uPhase + (g0 - s.a0), doorTop);
      if (s.axis === 'x') lin.position.set(doorAt, (H + doorTop) / 2, s.pz);
      else lin.position.set(s.px, (H + doorTop) / 2, doorAt);
      lin.rotation.y = s.ry;
    } else {
      const m = wallSeg(s.len, H, uPhase + 2.1);
      if (s.axis === 'x') m.position.set(s.px, H / 2, s.pz);
      else m.position.set(s.px, H / 2, s.pz);
      m.rotation.y = s.ry;
      if (s.axis === 'x') m.position.x = cx; else m.position.z = czr;
    }
  }
}

/* ====================================================== AUDIO (TRENCHFALL) */
const AU = { ctx: null, master: null, muted: false };
function audioInit() {
  if (AU.ctx) return;
  const C = new (window.AudioContext || window.webkitAudioContext)();
  AU.ctx = C; AU.master = C.createGain(); AU.master.gain.value = .5;
  AU.comp = C.createDynamicsCompressor();
  AU.comp.threshold.value = -18; AU.comp.knee.value = 22; AU.comp.ratio.value = 7;
  AU.comp.attack.value = .002; AU.comp.release.value = .16;
  AU.master.connect(AU.comp); AU.comp.connect(C.destination);
  // steel-corridor reverb: shorter and boxier than the battlefield roll
  const ir = C.createBuffer(2, C.sampleRate * .7 | 0, C.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = ir.getChannelData(ch);
    for (let i = 0; i < d.length; i++) {
      const t = i / d.length;
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2.8) * (ch ? .85 : 1) * (1 - Math.exp(-t * 90));
    }
  }
  AU.verb = C.createConvolver(); AU.verb.buffer = ir;
  AU.verbG = C.createGain(); AU.verbG.gain.value = .35;
  AU.verb.connect(AU.verbG); AU.verbG.connect(AU.comp);
  const buf = C.createBuffer(1, C.sampleRate * 2, C.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  AU.noise = buf;
  // the ship breathes: low hum + filtered air
  const hum = C.createOscillator(); hum.type = 'sine'; hum.frequency.value = 46;
  const humG = C.createGain(); humG.gain.value = .028;
  hum.connect(humG); humG.connect(AU.master); hum.start();
  const hum2 = C.createOscillator(); hum2.type = 'sine'; hum2.frequency.value = 92.3;
  const hum2G = C.createGain(); hum2G.gain.value = .009;
  hum2.connect(hum2G); hum2G.connect(AU.master); hum2.start();
  const air = C.createBufferSource(); air.buffer = buf; air.loop = true;
  const af = C.createBiquadFilter(); af.type = 'lowpass'; af.frequency.value = 320;
  const ag = C.createGain(); ag.gain.value = .016;
  air.connect(af); af.connect(ag); ag.connect(AU.master); air.start();
  const lfo = C.createOscillator(); lfo.frequency.value = .07;
  const lg = C.createGain(); lg.gain.value = .006;
  lfo.connect(lg); lg.connect(ag.gain); lfo.start();
}
function sNoise(dur, type, f0, f1, vol, t0) {
  const C = AU.ctx; if (!C || AU.muted) return; const t = t0 || C.currentTime;
  const s = C.createBufferSource(); s.buffer = AU.noise; s.loop = true;
  const f = C.createBiquadFilter(); f.type = type;
  f.frequency.setValueAtTime(f0, t); f.frequency.exponentialRampToValueAtTime(Math.max(30, f1), t + dur);
  const g = C.createGain(); g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(.0001, t + dur);
  s.connect(f); f.connect(g); g.connect(AU.master);
  if (AU.verb) { const vs = C.createGain(); vs.gain.value = .12; g.connect(vs); vs.connect(AU.verb); }
  s.start(t); s.stop(t + dur + .05);
}
function sTone(type, f0, f1, dur, vol, t0) {
  const C = AU.ctx; if (!C || AU.muted) return; const t = t0 || C.currentTime;
  const o = C.createOscillator(); o.type = type;
  o.frequency.setValueAtTime(f0, t); o.frequency.exponentialRampToValueAtTime(Math.max(20, f1), t + dur);
  const g = C.createGain(); g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(vol, t + .01);
  g.gain.exponentialRampToValueAtTime(.0001, t + dur);
  o.connect(g); g.connect(AU.master);
  if (AU.verb) { const vs = C.createGain(); vs.gain.value = .08; g.connect(vs); vs.connect(AU.verb); }
  o.start(t); o.stop(t + dur + .06);
}
/* layered gunshot: transient snap, body thump, powder crack, room tail */
function gunshot(o) {
  const C = AU.ctx; if (!C || AU.muted) return; const t = C.currentTime;
  const out = C.createGain(); out.gain.value = o.vol ?? 1; out.connect(AU.master);
  const send = C.createGain(); send.gain.value = .32; out.connect(send); send.connect(AU.verb);
  const o1 = C.createOscillator(); o1.type = 'square';
  o1.frequency.setValueAtTime(2600 * o.pitch, t);
  o1.frequency.exponentialRampToValueAtTime(900 * o.pitch, t + .012);
  const g1 = C.createGain(); g1.gain.setValueAtTime(.5 * o.crack, t);
  g1.gain.exponentialRampToValueAtTime(.001, t + .018);
  o1.connect(g1); g1.connect(out); o1.start(t); o1.stop(t + .03);
  const o2 = C.createOscillator(); o2.type = 'sine';
  o2.frequency.setValueAtTime(150 * o.pitch, t);
  o2.frequency.exponentialRampToValueAtTime(42, t + .14);
  const g2 = C.createGain(); g2.gain.setValueAtTime(.95 * o.body, t);
  g2.gain.exponentialRampToValueAtTime(.001, t + .16 + (o.boom || 0) * .22);
  o2.connect(g2); g2.connect(out); o2.start(t); o2.stop(t + .45);
  const s = C.createBufferSource(); s.buffer = AU.noise; s.loop = true;
  const f = C.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = .7;
  f.frequency.setValueAtTime(3800 * o.pitch, t);
  f.frequency.exponentialRampToValueAtTime(500, t + .1);
  const g3 = C.createGain(); g3.gain.setValueAtTime(.6 * o.crack, t);
  g3.gain.exponentialRampToValueAtTime(.001, t + .1 + (o.boom || 0) * .18);
  s.connect(f); f.connect(g3); g3.connect(out); s.start(t); s.stop(t + .4);
}
const SFX = {
  shot() { gunshot({ body: .9, crack: .9, pitch: 1 }); },
  smg() { gunshot({ body: .5, crack: .7, pitch: 1.3, vol: .85 }); },

for (let i = 0; i < MAXP; i++) pPos[i * 3 + 1] = -99;
{
  const [pc, px] = cv(32, 32);
  const pg = px.createRadialGradient(16, 16, 0, 16, 16, 15);
  pg.addColorStop(0, 'rgba(255,255,255,1)'); pg.addColorStop(1, 'rgba(255,255,255,0)');
  px.fillStyle = pg; px.fillRect(0, 0, 32, 32);
  const pts = new THREE.Points(pGeo, new THREE.PointsMaterial({
    map: new THREE.CanvasTexture(pc), size: .07, vertexColors: true, transparent: true,
    opacity: .95, depthWrite: false, blending: THREE.AdditiveBlending }));
  scene.add(pts);
}
function spawnP(x, y, z, vx, vy, vz, r, g, b, life, grav) {
  const k = pHead; pHead = (pHead + 1) % MAXP;
  pPos[k * 3] = x; pPos[k * 3 + 1] = y; pPos[k * 3 + 2] = z;
  pVel[k * 3] = vx; pVel[k * 3 + 1] = vy; pVel[k * 3 + 2] = vz;
  pCol[k * 3] = r; pCol[k * 3 + 1] = g; pCol[k * 3 + 2] = b;
  pLife[k] = life; pGrav[k] = grav;
}
function sparks(p, n) {
  for (let i = 0; i < n; i++)
    spawnP(p.x, p.y, p.z, rand(-2.5, 2.5), rand(.5, 3), rand(-2.5, 2.5),
      rand(1.5, 3), rand(.8, 1.6), .3, rand(.15, .4), -9);
  spawnP(p.x, p.y, p.z, rand(-1, 1), rand(.5, 1.5), rand(-1, 1), .8, .8, .85, .3, -2);
}
function updateParticles(dt) {
  for (let i = 0; i < MAXP; i++) {
    if (pLife[i] <= 0) continue;
    pLife[i] -= dt;
    if (pLife[i] <= 0) { pPos[i * 3 + 1] = -99; continue; }
    pVel[i * 3 + 1] += pGrav[i] * dt;
    pPos[i * 3] += pVel[i * 3] * dt;
    pPos[i * 3 + 1] += pVel[i * 3 + 1] * dt;
    pPos[i * 3 + 2] += pVel[i * 3 + 2] * dt;
  }
  pGeo.attributes.position.needsUpdate = true;
  pGeo.attributes.color.needsUpdate = true;
}

/* ------------------------------------------------------------ bullet holes */
const holes = [];
let holeHead = 0;
{
  const [hcv, hx] = cv(64, 64);
  const hg = hx.createRadialGradient(32, 32, 2, 32, 32, 30);
  hg.addColorStop(0, 'rgba(8,7,6,.95)'); hg.addColorStop(.45, 'rgba(20,17,14,.7)');
  hg.addColorStop(1, 'rgba(20,17,14,0)');
  hx.fillStyle = hg; hx.fillRect(0, 0, 64, 64);
  const hMat = new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(hcv),
    transparent: true, opacity: 0, depthWrite: false, polygonOffset: true, polygonOffsetFactor: -2 });
  const hGeo = new THREE.CircleGeometry(.04, 10);
  for (let i = 0; i < 50; i++) {
    const m = new THREE.Mesh(hGeo, hMat.clone());
    scene.add(m);
    holes.push(m);
  }
}
function bulletHole(point, normal) {
  const h = holes[holeHead]; holeHead = (holeHead + 1) % holes.length;
  h.position.copy(point).addScaledVector(normal, .006);
  h.lookAt(point.clone().add(normal));
  h.material.opacity = .9;
  h.scale.setScalar(rand(.8, 1.3));
}

/* --------------------------------------------------------------- brass */
const shellPool = [];
{
  const g = new THREE.CylinderGeometry(.011, .011, .05, 6);
  const m = new THREE.MeshStandardMaterial({ color: 0xe0b65a, metalness: .95, roughness: .18, envMapIntensity: 2.2 });
  for (let i = 0; i < 20; i++) {
    const s = new THREE.Mesh(g, m);
    s.visible = false; s.userData.live = false;
    scene.add(s); shellPool.push(s);
  }
}
function ejectShell() {
  const s = shellPool.find(x => !x.userData.live); if (!s) return;
  s.userData.live = true; s.visible = true;
  const rx = Math.cos(yaw), rz = -Math.sin(yaw);
  s.position.set(camera.position.x + rx * .3, camera.position.y - .25, camera.position.z + rz * .3);
  s.userData.v = { vx: rx * rand(1.5, 2.6) + rand(-.4, .4), vy: rand(2, 3), vz: rz * rand(1.5, 2.6) + rand(-.4, .4),
    sx: rand(-9, 9), sy: rand(-9, 9), t: 0 };
}
function updateShells(dt) {
  for (const s of shellPool) {
    if (!s.userData.live) continue;
    const u = s.userData.v; u.t += dt;
    u.vy -= 13 * dt;
    s.position.x += u.vx * dt; s.position.y += u.vy * dt; s.position.z += u.vz * dt;
    s.rotation.x += u.sx * dt; s.rotation.y += u.sy * dt;
    if (u.t > 1 || s.position.y < .03) {
      s.userData.live = false; s.visible = false;
      if (Math.random() < .7) SFX.ping();
    }
  }
}

/* --------------------------------------------------------------- rockets */
const rockets = [];
function fireRocket() {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.CylinderGeometry(.045, .045, .3, 10),
    new THREE.MeshStandardMaterial({ color: 0x3a3a30, roughness: .5, metalness: .6 }));
  body.rotation.x = Math.PI / 2;
  g.add(body);
  const tip = new THREE.Mesh(new THREE.ConeGeometry(.045, .12, 10),
    new THREE.MeshStandardMaterial({ color: 0xb08a3e, metalness: .85, roughness: .3 }));
  tip.rotation.x = -Math.PI / 2; tip.position.z = -.2;
  g.add(tip);
  camera.getWorldDirection(_dir);
  g.position.copy(camera.position).addScaledVector(_dir, .8);
  g.position.y -= .15;
  g.lookAt(g.position.clone().add(_dir));
  scene.add(g);
  rockets.push({ mesh: g, vel: _dir.clone().multiplyScalar(26), t: 0 });
}
function explode(p) {
  boomLight.position.copy(p);
  boomLight.intensity = 400;
  camShake = Math.max(camShake, .6);
  for (let i = 0; i < 36; i++)
    spawnP(p.x, p.y, p.z, rand(-6, 6), rand(-2, 7), rand(-6, 6),
      rand(2, 4.5), rand(.5, 1.6), .12, rand(.25, .7), -4);
  for (let i = 0; i < 14; i++)
    spawnP(p.x, p.y, p.z, rand(-3, 3), rand(0, 4), rand(-3, 3), .5, .5, .55, rand(.6, 1.2), 1.5);
  SFX.boom();
}
const rayR = new THREE.Raycaster();
function updateRockets(dt) {
  for (let i = rockets.length - 1; i >= 0; i--) {
    const r = rockets[i];
    r.t += dt;
    const step = r.vel.length() * dt;
    rayR.set(r.mesh.position, r.vel.clone().normalize());
    rayR.far = step + .15;
    const hit = rayR.intersectObjects(colliders, false)[0];
    if (hit || r.t > 6) {
      explode(hit ? hit.point : r.mesh.position);
      scene.remove(r.mesh);
      rockets.splice(i, 1);
      continue;
    }
    r.mesh.position.addScaledVector(r.vel, dt);
    if (Math.random() < .8)
      spawnP(r.mesh.position.x, r.mesh.position.y, r.mesh.position.z,
        rand(-.3, .3), rand(.2, .8), rand(-.3, .3), .5, .45, .4, rand(.3, .7), 1);
  }
}

/* ============================================================ player + fire */
const player = {
  wid: 0,
  mags: WEAPONS.map(w => w.magSize),
  fireCd: 0, reloadT: 0, fireHeld: false, ads: false,
  y: 0, vy: 0, grounded: true, bob: 0, sprint: false,
};
let vmKick = 0, vmSwing = 0, vmYawLag = 0, lastYawVM = 0, camShake = 0;
const _dir = new THREE.Vector3(), _org = new THREE.Vector3();
const ray = new THREE.Raycaster();
const curW = () => WEAPONS[player.wid];

function selectWeapon(i) {
  if (!WEAPONS[i] || i === player.wid) return;
  player.wid = i; player.reloadT = 0;
  for (let k = 0; k < WEAPONS.length; k++) gunModels[k].visible = k === i;
  SFX.load();
  updateHUD();
}
function startReload() {
  const w = curW();
  if (w.melee || player.reloadT > 0 || player.mags[player.wid] >= w.magSize) return;
  player.reloadT = w.reload;
  SFX.reload();
  updateHUD();
}
function finishReload() {
  player.mags[player.wid] = curW().magSize;
  updateHUD();
}
function muzzleWorld() {
  return new THREE.Vector3(.25, -.18, -1).applyMatrix4(camera.matrixWorld);
}
function muzzleFlash(end) {
  const p = muzzleWorld();
  tracer(p, end);
  muzzle.position.copy(p); muzzle.intensity = 60;
  flashSpr.position.copy(p);
  flashSpr.material.rotation = rand(TAU);
  flashSpr.scale.setScalar(rand(.45, .7));
  flashSpr.material.opacity = 1;
}
function hitscan(d, range) {
  ray.set(_org, d); ray.far = range;
  return ray.intersectObjects(colliders, false)[0] || null;
}
function fireWeapon() {
  const w = curW();
  if (w.rocket) {
    if (player.reloadT > 0) return;
    player.mags[player.wid] = 0;
    player.fireCd = w.rate; vmKick = 2.2; camShake = Math.max(camShake, .35);
    fireRocket(); muzzle.intensity = 60;
    SFX.dmr();
    player.reloadT = w.reload; // the next round goes in by itself
    updateHUD();
    return;
  }
  if (player.reloadT > 0) return;
  if (w.melee) {
    player.fireCd = w.rate; vmSwing = 1.15; vmKick = w.kick;
    SFX.slash();
    camera.getWorldDirection(_dir);
    _org.copy(camera.position);
    const hit = hitscan(_dir, w.range);
    if (hit) { sparks(hit.point, 3); bulletHole(hit.point, hit.face.normal.clone().transformDirection(hit.object.matrixWorld)); }
    return;
  }
  if (player.mags[player.wid] <= 0) { SFX.dry(); startReload(); return; }
  if (w.flame) {
    player.mags[player.wid]--;
    player.fireCd = w.rate;
    camera.getWorldDirection(_dir);
    const p = muzzleWorld();
    for (let i = 0; i < 5; i++) {
      const sp = rand(11, 16);
      spawnP(p.x, p.y, p.z,
        _dir.x * sp + rand(-1.6, 1.6), _dir.y * sp + rand(.5, 2.2), _dir.z * sp + rand(-1.6, 1.6),
        rand(2, 4), rand(.5, 1.2), .08, rand(.3, .55), 2.5);
    }
    muzzle.position.copy(p); muzzle.intensity = 45;
    SFX.flame();
    if (player.mags[player.wid] <= 0) startReload();
    updateHUD();
    return;
  }
  player.mags[player.wid]--;
  player.fireCd = w.rate;
  vmKick = w.kick;
  if (w.kick > 1.4) camShake = Math.max(camShake, .2);
  camera.getWorldDirection(_dir);
  _org.copy(camera.position);
  const spread = player.ads ? w.adsSpread : w.spread;
  const base = _dir.clone();
  let endP = null;
  for (let p = 0; p < w.pellets; p++) {
    const d = base.clone();
    d.x += rand(-spread, spread); d.y += rand(-spread, spread); d.z += rand(-spread, spread);
    d.normalize();
    const hit = hitscan(d, w.range);
    let pEnd;
    if (hit) {
      pEnd = hit.point;
      sparks(hit.point, 3);
      const n = hit.face ? hit.face.normal.clone().transformDirection(hit.object.matrixWorld) : d.clone().negate();
      bulletHole(hit.point, n);
    } else {
      pEnd = _org.clone().addScaledVector(d, w.range);
    }
    if (!endP) endP = pEnd;
    if (w.pellets <= 2 || p % 3 === 0) tracer(muzzleWorld(), pEnd);
  }
  muzzleFlash(endP);
  SFX[w.sfx]();
  ejectShell();
  if (player.mags[player.wid] <= 0) startReload();
  updateHUD();
}

/* ---------------------------------------------------------------- HUD */
const hud = document.getElementById('hud');
const wpnEl = document.getElementById('wpn');
const xhEl = document.getElementById('xh');
function updateHUD() {
  const w = curW();
  document.getElementById('wname').textContent = w.name;
  document.getElementById('ammo').innerHTML = w.melee ? '—'
    : player.reloadT > 0 ? '<span>reloading…</span>'
    : `${player.mags[player.wid]} <span>/ ∞</span>`;
  document.getElementById('slots').innerHTML =
    SLOT_TAGS.map((t, i) => i === player.wid ? `<b>${i + 1} ${t}</b>` : `${i + 1} ${t}`).join(' · ');
}
updateHUD();

/* ------------------------------------------------------------- controls */
const keys = {};
let yaw = 0, pitch = 0, tYaw = 0, tPitch = 0;
let locked = false;
let mouseDownL = false;
const vel = new THREE.Vector3();

addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (locked) {
    if (e.code.startsWith('Digit')) {
      const i = +e.code.slice(5) - 1;
      if (i >= 0 && i < 8) selectWeapon(i);
    }
    if (e.code === 'KeyR') startReload();
  }
});
addEventListener('keyup', e => keys[e.code] = false);
addEventListener('wheel', e => {
  if (!locked) return;
  const n = WEAPONS.length;
  selectWeapon((player.wid + (e.deltaY > 0 ? 1 : n - 1)) % n);
});
renderer.domElement.addEventListener('click', () => {
  if (!locked) renderer.domElement.requestPointerLock();
});
addEventListener('mousedown', e => {
  if (!locked) return;
  if (e.button === 0) mouseDownL = true;
  if (e.button === 2) player.ads = true;
});
addEventListener('mouseup', e => {
  if (e.button === 0) mouseDownL = false;
  if (e.button === 2) player.ads = false;
});
addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === renderer.domElement;
  hud.classList.toggle('hidden', locked);
  wpnEl.classList.toggle('on', locked);
  xhEl.classList.toggle('on', locked);
  if (locked) audioInit();
});
document.addEventListener('mousemove', e => {
  if (!locked) return;
  const sens = player.ads ? .0012 : .0021;
  tYaw -= e.movementX * sens;
  tPitch -= e.movementY * sens;
  tPitch = Math.max(-1.45, Math.min(1.45, tPitch));
});

/* the corridor walkway is 7cm proud of the deck */
function floorY(x, z) {
  return (Math.abs(x) < .78 && z < Z0 && z > Z1) ? .07 : 0;
}

/* ------------------------------------------------------------------ post */
const rt = new THREE.WebGLRenderTarget(innerWidth, innerHeight, {
  type: THREE.HalfFloatType, samples: 4 });
const composer = new EffectComposer(renderer, rt);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), .32, .5, 1.0);
composer.addPass(bloom);
composer.addPass(new OutputPass());

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

/* ------------------------------------------------------------------ loop */
const clock = new THREE.Clock();
let attract = 0, stepAcc = 0;

function frame() {
  const dt = Math.min(clock.getDelta(), .05);
  const t = clock.elapsedTime;

  if (!locked) {
    attract += dt;
    const az = Z0 - 1.2 - (attract * .35) % (L - 6);
    camera.position.set(Math.sin(attract * .31) * .35, 1.62 + Math.sin(attract * .8) * .02, az);
    tYaw = yaw = Math.sin(attract * .2) * .14;
    tPitch = pitch = Math.sin(attract * .27) * .035;
  } else {
    const k = 1 - Math.exp(-dt * 22);
    yaw += (tYaw - yaw) * k;
    pitch += (tPitch - pitch) * k;
    const f = (keys.KeyW ? 1 : 0) - (keys.KeyS ? 1 : 0);
    const s = (keys.KeyD ? 1 : 0) - (keys.KeyA ? 1 : 0);
    player.sprint = (keys.ShiftLeft || keys.ShiftRight) && f > 0 && !player.ads;
    const speed = 3.0 * (player.sprint ? 1.8 : 1) * (player.ads ? .55 : 1);
    const dir = new THREE.Vector3(
      Math.sin(yaw) * -f + Math.cos(yaw) * s, 0,
      Math.cos(yaw) * -f - Math.sin(yaw) * s);
    if (dir.lengthSq() > 0) dir.normalize().multiplyScalar(speed);
    vel.lerp(dir, 1 - Math.exp(-dt * 9));
    let nx = camera.position.x + vel.x * dt;
    let nz = camera.position.z + vel.z * dt;
    const ox = camera.position.x, oz = camera.position.z;
    if (canStand(nx, nz)) { camera.position.x = nx; camera.position.z = nz; }
    else if (canStand(nx, oz)) { camera.position.x = nx; vel.z = 0; }
    else if (canStand(ox, nz)) { camera.position.z = nz; vel.x = 0; }
    else { vel.set(0, 0, 0); }

    // jump + gravity
    const fy = floorY(camera.position.x, camera.position.z);
    if (keys.Space && player.grounded) {
      player.vy = 4.7; player.grounded = false;
      SFX.step();
    }
    if (!player.grounded || player.y > fy) {
      player.vy -= 13.5 * dt;
      player.y += player.vy * dt;
      if (player.y <= fy) {
        player.y = fy;
        if (player.vy < -3.5) { SFX.land(); camShake = Math.max(camShake, .12); }
        else if (player.vy < -.5) SFX.step();
        player.vy = 0; player.grounded = true;
      }
    } else {
      player.y = lerp(player.y, fy, Math.min(1, dt * 14));
    }

    // head bob + footsteps, scaled by actual speed over the deck
    const sp = vel.length();
    if (player.grounded) {
      player.bob += dt * (4 + sp * 2.4) * Math.min(sp, 1);
      stepAcc += sp * dt;
      if (stepAcc > (player.sprint ? 2.4 : 2.0)) { stepAcc = 0; SFX.step(); }
    }
    camera.position.y = 1.66 + player.y + Math.sin(player.bob) * .028 * Math.min(sp / 2.5, 1) * (player.grounded ? 1 : 0);

    // weapons
    player.fireCd -= dt;
    const w = curW();
    if (mouseDownL && player.fireCd <= 0 && (w.auto || !player.fireHeld)) fireWeapon();
    player.fireHeld = mouseDownL;
    if (player.reloadT > 0) {
      player.reloadT -= dt;
      if (player.reloadT <= 0) finishReload();
    }
  }

  camera.rotation.set(0, 0, 0);
  camera.rotateY(yaw);
  camera.rotateX(pitch);
  camera.rotateZ(Math.sin(player.bob * .5) * .003);
  if (camShake > .002) {
    camera.rotateX(rand(-1, 1) * camShake * .03);
    camera.rotateZ(rand(-1, 1) * camShake * .02);
    camShake *= Math.exp(-dt * 6);
  }

  // ADS fov
  const wantFov = player.ads ? curW().zoom : (player.sprint ? 80 : 72);
  if (Math.abs(camera.fov - wantFov) > .2) {
    camera.fov = lerp(camera.fov, wantFov, 1 - Math.pow(.0001, dt));
    camera.updateProjectionMatrix();
  }

  // viewmodel sway, kick, swing, reload dip (TRENCHFALL's maths)
  vmKick = Math.max(0, vmKick - dt * 9);
  vmSwing = Math.max(0, vmSwing - dt * 4);
  const vx0 = player.ads ? .0 : .32, vy0 = player.ads ? -.225 : -.3, vz0 = player.ads ? -.42 : -.55;
  vm.position.set(
    lerp(vm.position.x, vx0 + Math.sin(player.bob * .5) * .012, 1 - Math.pow(.000001, dt)),
    vy0 + Math.abs(Math.sin(player.bob)) * .018 + vmKick * .04,
    vz0 + vmKick * .09);
  const yawD = clamp((yaw - lastYawVM) * 6, -.09, .09); lastYawVM = yaw;
  vmYawLag += (yawD - vmYawLag) * Math.min(1, dt * 10);
  vm.rotation.y = vmYawLag;
  vm.rotation.x = vmKick * .16 - vmSwing * 1.1 + vmYawLag * .15;
  vm.rotation.z = vmSwing * .5 - vmYawLag * .5;
  if (player.reloadT > 0)
    vm.rotation.x += Math.sin(clamp(player.reloadT / (curW().reload || 1), 0, 1) * Math.PI) * .7;

  // crosshair breathes with the weapon's truth
  if (locked) {
    const w2 = curW();
    const sp2 = (player.ads ? w2.adsSpread : w2.spread);
    const g2 = clamp(sp2 * 900 + vmKick * 9 + (player.sprint ? 7 : 0) + 4, 4, 26);
    xhEl.style.setProperty('--g', g2.toFixed(1) + 'px');
  }

  // effects
  muzzle.intensity = Math.max(0, muzzle.intensity - dt * 900);
  boomLight.intensity = Math.max(0, boomLight.intensity - dt * 1400);
  flashSpr.material.opacity = Math.max(0, flashSpr.material.opacity - dt * 16);
  for (const tr of tracers) {
    if (tr.t > 0) { tr.t -= dt; tr.l.material.opacity = Math.max(0, tr.t / .08) * .9; }
  }
  for (const h of holes) if (h.material.opacity > 0) h.material.opacity -= dt * .02;
  updateParticles(dt);
  updateShells(dt);
  updateRockets(dt);

  // the reactor breathes
  const pulse = 1.6 + Math.sin(t * 2.1) * .7 + Math.sin(t * 5.7) * .2;
  for (const r of reactorRings) r.material.emissiveIntensity = pulse;
  if (corePulse) corePulse.intensity = 8 + pulse * 3.5;

  // drifting dust
  const dp = dust.geometry.attributes.position;
  const seed = dust.userData.seed;
  for (let i = 0; i < dp.count; i++) {
    dp.array[i * 3] += Math.sin(t * .3 + seed[i]) * .0006;
    dp.array[i * 3 + 1] += Math.cos(t * .22 + seed[i] * 1.7) * .0005;
  }
  dp.needsUpdate = true;

  composer.render();
  requestAnimationFrame(frame);
}
frame();

/* headless QA hook */
window.KQA = {
  lock() { locked = true; hud.classList.add('hidden'); wpnEl.classList.add('on'); xhEl.classList.add('on'); },
  tp(x, z, y2, p2) { camera.position.set(x, 1.66, z); tYaw = yaw = y2 || 0; tPitch = pitch = p2 || 0; },
  select: selectWeapon,
  fire() { mouseDownL = true; setTimeout(() => mouseDownL = false, 60); },
};
</script>
</body>
</html>
