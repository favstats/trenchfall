<!doctype html>
<!--
  KESTREL — the descent
  A seed-built roguelike horror. Every deck, room, anomaly, and SPECIES is
  generated from the run's seed — share ?seed=N and someone else boards the
  exact same ship and meets the exact same creatures (Library of Babel, but
  it's a haunted salvage hull). Textures are painted onto <canvas> at load,
  meshes are primitives, creature voices are synthesized from the seed.
  Foley uses the repo's CC0 sample packs (audio/kenney, audio/guns), with
  full synth fallback if they're missing.

  Find the hatch. Go down. It gets worse.
-->

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const TAU = Math.PI * 2;
const $ = id => document.getElementById(id);

/* ----------------------------------------------------------- run state */
const QS = new URLSearchParams(location.search);
let RUN;
try { RUN = JSON.parse(sessionStorage.getItem('kestrelRun')); } catch (e) { RUN = null; }
const FRESH = !RUN;
if (!RUN) RUN = {
  seed: QS.has('seed') ? +QS.get('seed') : (Math.random() * 1e9 | 0),
  deck: QS.has('d') ? +QS.get('d') : 1,
  hp: 100, battery: 100,
  owned: [true, false, false, false, false, false, true, false],
  mags: [30, 0, 0, 0, 0, 0, 0, 0],
  reserve: [60, 0, 0, 0, 0, 0, 0, 0],
  idols: 0, kills: 0,
};
sessionStorage.removeItem('kestrelRun'); // dying mid-deck must not resume
const BEST = +(localStorage.getItem('kestrelBest') || 0);

/* ---------------------------------------------------------------- rng */
let _s = (RUN.seed ^ (RUN.deck * 7919)) | 0;
const rnd = () => { _s |= 0; _s = _s + 0x6D2B79F5 | 0;
  let t = Math.imul(_s ^ _s >>> 15, 1 | _s);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296; };
const rr = (a, b) => a + rnd() * (b - a);
const rpick = a => a[rnd() * a.length | 0];
const rand = (a, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
const pick = a => a[Math.random() * a.length | 0];
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;

const HSALT = 7;
function hash(ix, iz) { let n = ix * 374761393 + iz * 668265263 + HSALT | 0;
  n = (n ^ (n >> 13)) * 1274126177; return ((n ^ (n >> 16)) >>> 0) / 4294967295; }
function smoothNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y), fx = x - ix, fy = y - iy;
  const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
  const a = hash(ix, iy), b = hash(ix + 1, iy), c = hash(ix, iy + 1), d = hash(ix + 1, iy + 1);
  return a + (b - a) * sx + (c - a) * sy + (a - b - c + d) * sx * sy;
}
function fbm2(x, y, oct = 4) {
  let v = 0, a = .5, fx = x, fy = y;
  for (let o = 0; o < oct; o++) { v += a * smoothNoise(fx, fy); fx = fx * 2.07 + 13.1; fy = fy * 2.07 + 7.7; a *= .5; }
  return v;
}

/* ------------------------------------------------------------ palette */
const BANDS = ['#c06426', '#7d8a34', '#8a2f2a', '#3f6f8a', '#6a4a8a', '#8a7a2a', '#274d44'];
const PAL = (() => {
  const d = RUN.deck;
  const band = d === 1 ? BANDS[0] : BANDS[(d - 1 + (RUN.seed % 3)) % BANDS.length];
  return {
    band,
    bandRGB: [parseInt(band.slice(1, 3), 16), parseInt(band.slice(3, 5), 16), parseInt(band.slice(5, 7), 16)],
    warm: d < 3 ? 0xffe3bd : d < 5 ? 0xffd2a0 : 0xffc890,
    hemi: Math.max(.16, .5 - d * .055),
    fogFar: Math.max(17, 42 - d * 3),
    accent: d < 4 ? 0x4be8ff : d < 6 ? 0x6affc2 : 0xff5a4a,
    lightChance: Math.max(.35, .95 - d * .09),  // rooms that still have working lights
  };
})();

/* ------------------------------------------------------- canvas tools */
function cv(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return [c, c.getContext('2d')];
}
function speckle(x, w, h, n, alpha, light) {
  for (let i = 0; i < n; i++) {
    x.fillStyle = `rgba(${light ? '255,255,255' : '0,0,0'},${alpha * rr(.4, 1)})`;
    x.fillRect(rnd() * w, rnd() * h, rr(1, 2.4), rr(1, 2.4));
  }
}
function scratches(x, w, h, n, len) {
  for (let i = 0; i < n; i++) {
    const px = rnd() * w, py = rnd() * h, a = rnd() * Math.PI, l = rr(len * .3, len);
    x.strokeStyle = rnd() < .5 ? `rgba(255,255,255,${rr(.04, .14)})` : `rgba(20,16,12,${rr(.05, .16)})`;
    x.lineWidth = rr(.6, 1.6);
    x.beginPath(); x.moveTo(px, py);
    x.lineTo(px + Math.cos(a) * l, py + Math.sin(a) * l); x.stroke();
  }
}
function grimeBlobs(x, w, h, n, rMax, color, aMax) {
  for (let i = 0; i < n; i++) {
    const px = rnd() * w, py = rnd() * h, r = rr(rMax * .25, rMax);
    const g = x.createRadialGradient(px, py, 0, px, py, r);
    g.addColorStop(0, color.replace('A', (aMax * rr(.4, 1)).toFixed(3)));
    g.addColorStop(1, color.replace('A', '0'));
    x.fillStyle = g;
    x.fillRect(px - r, py - r, r * 2, r * 2);
  }
}
function chip(x, px, py, r, fill, rim) {
  x.beginPath();
  const n = 7 + (rnd() * 4 | 0);
  for (let i = 0; i <= n; i++) {
    const a = i / n * TAU, rad = r * rr(.55, 1.25);
    const X = px + Math.cos(a) * rad, Y = py + Math.sin(a) * rad * .8;
    i ? x.lineTo(X, Y) : x.moveTo(X, Y);
  }
  x.closePath();
  x.fillStyle = fill; x.fill();
  x.strokeStyle = rim; x.lineWidth = 1.4; x.stroke();
}
function normalFromHeight(src, strength) {
  const w = src.width, h = src.height;
  const d = src.getContext('2d').getImageData(0, 0, w, h).data;
  const [out, ox] = cv(w, h);
  const img = ox.createImageData(w, h);
  const H = (X, Y) => d[(((Y + h) % h) * w + ((X + w) % w)) * 4] / 255;
  for (let y = 0; y < h; y++) for (let X = 0; X < w; X++) {
    const dx = (H(X - 1, y) - H(X + 1, y)) * strength;
    const dy = (H(X, y + 1) - H(X, y - 1)) * strength;
    const inv = 1 / Math.hypot(dx, dy, 1);
    const i = (y * w + X) * 4;
    img.data[i] = (dx * inv * .5 + .5) * 255;
    img.data[i + 1] = (dy * inv * .5 + .5) * 255;
    img.data[i + 2] = (inv * .5 + .5) * 255;
    img.data[i + 3] = 255;
  }
  ox.putImageData(img, 0, 0);
  return out;
}
function tex(canvas, srgb) {
  const t = new THREE.CanvasTexture(canvas);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  if (srgb) t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

/* =================================================== WALL MAPS (8m x 3.15m) */
const PXM = 256;
const WW = 8 * PXM, WH = Math.round(3.15 * PXM);
function wallMaps() {
  const [BR, BG, BB] = PAL.bandRGB;
  const [c, x] = cv(WW, WH), [hc, hx] = cv(WW, WH), [rc, rx] = cv(WW, WH);
  const Y = m => WH - m * PXM;
  hx.fillStyle = '#808080'; hx.fillRect(0, 0, WW, WH);
  rx.fillStyle = '#9e9e9e'; rx.fillRect(0, 0, WW, WH);
  x.fillStyle = '#14130f'; x.fillRect(0, 0, WW, WH);
  const rows = [
    [0.00, 0.16, 8.0, 0, 'base'],
    [0.16, 1.08, 1.0, 0, 'cream'],
    [1.08, 1.62, 1.0, .5, 'band'],
    [1.62, 3.15, 2.0, 0, 'cream'],
  ];
  const seam = 5;
  for (const [b, t, pitch, off, kind] of rows) {
    for (let px = -off; px < 8; px += pitch) {
      const x0 = px * PXM + seam, x1 = Math.min((px + pitch) * PXM - seam, WW);
      const y0 = Y(t) + seam, y1 = Y(b) - seam;
      const w = x1 - x0, h = y1 - y0;
      if (w <= 0) continue;
      if (kind === 'base') {
        x.fillStyle = '#23211d'; x.fillRect(x0, y0, w, h);
        rx.fillStyle = '#6a6a6a'; rx.fillRect(x0, y0, w, h);
        continue;
      }
      const band = kind === 'band';
      const v = rr(-7, 7) | 0;
      x.fillStyle = band
        ? `rgb(${BR + v},${BG + (v >> 1)},${BB})`
        : `rgb(${221 + v},${213 + v},${198 + v})`;
      x.fillRect(x0, y0, w, h);
      const g = x.createLinearGradient(0, y0, 0, y1);
      g.addColorStop(0, 'rgba(255,255,255,.10)');
      g.addColorStop(.5, 'rgba(255,255,255,0)');
      g.addColorStop(1, 'rgba(0,0,0,.14)');
      x.fillStyle = g; x.fillRect(x0, y0, w, h);
      x.strokeStyle = 'rgba(255,255,255,.30)'; x.lineWidth = 2;
      x.strokeRect(x0 + 1.5, y0 + 1.5, w - 3, h - 3);
      x.strokeStyle = 'rgba(0,0,0,.32)';
      x.strokeRect(x0 + 4, y0 + 4, w - 8, h - 8);
      hx.fillStyle = '#b8b8b8'; hx.fillRect(x0, y0, w, h);
      hx.strokeStyle = '#8a8a8a'; hx.lineWidth = 6;
      hx.strokeRect(x0 + 3, y0 + 3, w - 6, h - 6);
      rx.fillStyle = band ? '#888888' : '#a2a2a2';
      rx.fillRect(x0, y0, w, h);
      x.fillStyle = 'rgba(30,26,22,.8)';
      for (const [sx, sy] of [[x0 + 12, y0 + 12], [x1 - 12, y0 + 12], [x0 + 12, y1 - 12], [x1 - 12, y1 - 12]]) {
        x.beginPath(); x.arc(sx, sy, 3.2, 0, 7); x.fill();
      }
      if (band) {
        const nChips = 5 + (rnd() * 8 | 0);
        for (let i = 0; i < nChips; i++) {
          const cxp = x0 + rnd() * w, cyp = y0 + rnd() * h, r = rr(5, 24);
          chip(x, cxp, cyp, r, `rgb(${228 + (rnd() * 8 | 0)},${222},${208})`, 'rgba(60,40,20,.55)');
          chip(hx, cxp, cyp, r, '#a0a0a0', '#888');
          chip(rx, cxp, cyp, r, '#c8c8c8', '#c8c8c8');
        }
      }
    }
  }
  scratches(x, WW, WH, 90, 130);
  grimeBlobs(x, WW, WH, 50 + RUN.deck * 14, 120, 'rgba(35,28,20,A)', .13 + RUN.deck * .015);
  const gb = x.createLinearGradient(0, Y(0), 0, Y(.7));
  gb.addColorStop(0, 'rgba(20,16,10,.30)'); gb.addColorStop(1, 'rgba(20,16,10,0)');
  x.fillStyle = gb; x.fillRect(0, Y(.7), WW, Y(0) - Y(.7));
  for (let i = 0; i < 26 + RUN.deck * 6; i++) {
    const px = rnd() * WW, py = rnd() * WH * .7, l = rr(20, 120);
    x.strokeStyle = `rgba(40,32,22,${rr(.05, .15)})`; x.lineWidth = rr(1, 3);
    x.beginPath(); x.moveTo(px, py); x.lineTo(px + rr(-3, 3), py + l); x.stroke();
  }
  speckle(x, WW, WH, 9000, .05);
  speckle(rx, WW, WH, 7000, .10);
  speckle(rx, WW, WH, 7000, .10, true);
  return { map: tex(c, true), normalMap: tex(normalFromHeight(hc, 2.6)), roughnessMap: tex(rc) };
}
function ceilingMaps() {
  const S = 1024, [c, x] = cv(S, S), [hc, hx] = cv(S, S);
  x.fillStyle = '#191a1c'; x.fillRect(0, 0, S, S);
  hx.fillStyle = '#808080'; hx.fillRect(0, 0, S, S);
  const P = S / 4, seam = 4;
  for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) {
    const x0 = i * P + seam, y0 = j * P + seam, w = P - seam * 2;
    const v = rr(-5, 5) | 0;
    x.fillStyle = `rgb(${224 + v},${222 + v},${214 + v})`;
    x.fillRect(x0, y0, w, w);
    x.strokeStyle = 'rgba(0,0,0,.25)'; x.lineWidth = 3;
    x.strokeRect(x0 + 2, y0 + 2, w - 4, w - 4);
    hx.fillStyle = '#b0b0b0'; hx.fillRect(x0, y0, w, w);
    hx.strokeStyle = '#909090'; hx.lineWidth = 5;
    hx.strokeRect(x0 + 2, y0 + 2, w - 4, w - 4);
  }
  grimeBlobs(x, S, S, 24 + RUN.deck * 8, 90, 'rgba(30,26,20,A)', .10 + RUN.deck * .02);
  speckle(x, S, S, 3000, .04);
  return { map: tex(c, true), normalMap: tex(normalFromHeight(hc, 2)) };
}
function grateMaps() {
  const S = 512, [c, x] = cv(S, S), [hc, hx] = cv(S, S), [rc, rx] = cv(S, S);
  x.fillStyle = '#33363b'; x.fillRect(0, 0, S, S);
  hx.fillStyle = '#c0c0c0'; hx.fillRect(0, 0, S, S);
  rx.fillStyle = '#7a7a7a'; rx.fillRect(0, 0, S, S);
  speckle(x, S, S, 2600, .07);
  speckle(x, S, S, 1200, .05, true);
  const sw = 44, sh = 13, gx = 14, gy = 13;
  for (let row = 0, y = 8; y < S - sh; y += sh + gy, row++) {
    for (let px = row % 2 ? -(sw >> 1) : 8; px < S; px += sw + gx) {
      x.fillStyle = '#0a0b0d';
      x.beginPath(); x.roundRect(px, y, sw, sh, 5); x.fill();
      x.strokeStyle = 'rgba(150,160,170,.35)'; x.lineWidth = 1.5;
      x.beginPath(); x.moveTo(px + 4, y + sh - 1.5); x.lineTo(px + sw - 4, y + sh - 1.5); x.stroke();
      hx.fillStyle = '#202020';
      hx.beginPath(); hx.roundRect(px, y, sw, sh, 5); hx.fill();
      rx.fillStyle = '#cccccc';
      rx.beginPath(); rx.roundRect(px, y, sw, sh, 5); rx.fill();
    }
  }

  return { map: tex(c, true), normalMap: tex(normalFromHeight(hc, 3)), roughnessMap: tex(rc) };
}
function plateMaps() {
  const S = 512, [c, x] = cv(S, S), [hc, hx] = cv(S, S);
  x.fillStyle = '#3b3e44'; x.fillRect(0, 0, S, S);
  hx.fillStyle = '#a0a0a0'; hx.fillRect(0, 0, S, S);
  const P = S / 2;
  for (let i = 0; i < 2; i++) for (let j = 0; j < 2; j++) {
    const v = rr(-4, 4) | 0;
    x.fillStyle = `rgb(${59 + v},${62 + v},${68 + v})`;
    x.fillRect(i * P + 3, j * P + 3, P - 6, P - 6);
    x.strokeStyle = 'rgba(0,0,0,.5)'; x.lineWidth = 4;
    x.strokeRect(i * P + 2, j * P + 2, P - 4, P - 4);
    hx.strokeStyle = '#707070'; hx.lineWidth = 6;
    hx.strokeRect(i * P + 2, j * P + 2, P - 4, P - 4);
  }
  for (let i = 0; i < 120; i++) {
    const px = rnd() * S, py = rnd() * S, l = rr(20, 90);
    x.strokeStyle = `rgba(${rnd() < .5 ? '140,148,158' : '18,18,20'},${rr(.04, .1)})`;
    x.lineWidth = rr(.8, 2.4);
    x.beginPath(); x.moveTo(px, py); x.lineTo(px, py + l); x.stroke();
  }
  speckle(x, S, S, 3500, .06);
  return { map: tex(c, true), normalMap: tex(normalFromHeight(hc, 2)) };
}
function accentPaintMaps() {
  const [BR, BG, BB] = PAL.bandRGB;
  const W2 = 1024, H2 = 256, [c, x] = cv(W2, H2), [rc, rx] = cv(W2, H2);
  x.fillStyle = `rgb(${BR},${BG},${BB})`; x.fillRect(0, 0, W2, H2);
  rx.fillStyle = '#828282'; rx.fillRect(0, 0, W2, H2);
  grimeBlobs(x, W2, H2, 30, 90, 'rgba(255,200,140,A)', .10);
  grimeBlobs(x, W2, H2, 30, 90, 'rgba(20,12,5,A)', .18);

    for (const n of [c - 1, c + 1, c - GW, c + GW]) {

      if (Math.abs((n % GW) - (c % GW)) + Math.abs(((n / GW) | 0) - ((c / GW) | 0)) !== 1) continue;

/* ------------------------------------------------------------ the build */
const INTER = [];       // interactables: {x,z,kind,label,...}
const WINDOWS = [];
const hallLampMat = new THREE.MeshStandardMaterial({ color: 0, emissive: 0xffe8c8, emissiveIntensity: 2.0, roughness: 1 });
for (let c = 0; c < GW * GH; c++) {
  if (map[c] !== HALL) continue;
  const x = cellCX(c), z = cellCZ(c);
  const dirs = [
    { d: [1, 0], n: c + 1, ok: (c % GW) < GW - 1 },
    { d: [-1, 0], n: c - 1, ok: (c % GW) > 0 },
    { d: [0, 1], n: c - GW, ok: c >= GW },        // -z is "up" the grid (gy-1)
    { d: [0, -1], n: c + GW, ok: c < GW * (GH - 1) },
  ];
  // grid gy increases toward -z, so neighbor at gy-1 sits at HIGHER z (closer to start)
  floorPiece(2.4, 2.4, x, z, plateMat, 1);
  ceilPiece(2.4, 2.4, x, z, ceilMat, 4, HH);
  const lamp = new THREE.Mesh(new THREE.BoxGeometry(.5, .04, .14), ((c % 3) !== 2) ? hallLampMat : deadLightMat);
  lamp.position.set(x, HH - .02, z);
  scene.add(lamp);
  for (const dir of dirs) {
    const [dx, dzg] = dir.d;
    const wx = dx, wz = dzg === 1 ? 1 : dzg === -1 ? -1 : 0; // world z dir for this arm
    const open = dir.ok && map[dir.n] !== SOLID && edgeOpen(c, dir.n);
    if (open) {
      const ax = x + wx * (1.2 + .9), az = z + wz * (1.2 + .9);
      floorPiece(wx ? 1.8 : 2.4, wx ? 2.4 : 1.8, ax, az, plateMat, 1);
      ceilPiece(wx ? 1.8 : 2.4, wx ? 2.4 : 1.8, ax, az, ceilMat, 4, HH);
      if (wx) { // arm along x: side walls at z +/-1.2
        for (const s of [-1, 1])
          buildWall(x + wx * 1.2, z + s * 1.2, x + wx * 3, z + s * 1.2, 0, -s, HH, wallMat);
      } else {
        for (const s of [-1, 1])
          buildWall(x + s * 1.2, z + wz * 1.2, x + s * 1.2, z + wz * 3, -s, 0, HH, wallMat);
      }
    } else {
      // closed throat
      if (wx) buildWall(x + wx * 1.2, z - 1.2, x + wx * 1.2, z + 1.2, -wx, 0, HH, wallMat);
      else buildWall(x - 1.2, z + wz * 1.2, x + 1.2, z + wz * 1.2, 0, -wz, HH, wallMat);
    }
  }
}
for (const r of ROOMS) {
  const wW = r.w * CELL, wD = r.h * CELL;
  const isPool = r.kind === 'pool';
  floorPiece(wW, wD, r.cx, r.cz, r.kind === 'engine' ? grateMat : plateMat, r.kind === 'engine' ? 1.5 : 1);
  if (isPool) {
    const wat = new THREE.Mesh(new THREE.PlaneGeometry(wW - 1.6, wD - 1.6), waterMat);
    wat.rotation.x = -Math.PI / 2;
    wat.position.set(r.cx, .06, r.cz);
    scene.add(wat);
    WINDOWS.push({ kind: 'water', mesh: wat });
  }
  ceilPiece(wW, wD, r.cx, r.cz, ceilMat, 4, H);
  for (const c of r.cells) {
    const x = cellCX(c), z = cellCZ(c);
    const edges = [
      { n: c + 1, ok: (c % GW) < GW - 1, bx: x + 3, bz: z, alongX: false, nx: -1, nz: 0 },
      { n: c - 1, ok: (c % GW) > 0, bx: x - 3, bz: z, alongX: false, nx: 1, nz: 0 },
      { n: c - GW, ok: c >= GW, bx: x, bz: z + 3, alongX: true, nx: 0, nz: -1 },
      { n: c + GW, ok: c < GW * (GH - 1), bx: x, bz: z - 3, alongX: true, nx: 0, nz: 1 },
    ];
    for (const e of edges) {
      const solidSide = !e.ok || map[e.n] === SOLID;
      const sameRoom = e.ok && map[e.n] === r.id;
      if (sameRoom) continue;
      if (solidSide || !edgeOpen(c, e.n)) {
        if (e.alongX) buildWall(e.bx - 3, e.bz, e.bx + 3, e.bz, e.nx, e.nz, H, wallMat);
        else buildWall(e.bx, e.bz - 3, e.bx, e.bz + 3, e.nx, e.nz, H, wallMat);
      } else {
        buildDoorway(e.bx, e.bz, e.alongX, e.nx, e.nz, H, wallMat, c < e.n);
      }
    }
  }
  // light spine: one fixture per cell-row of the room
  for (let i = 0; i < r.w; i++)
    roomLight(((r.gx + i) - (GW - 1) / 2) * CELL, r.cz, r.lit,
      r.kind === 'chapel' ? 0xffb070 : r.kind === 'pool' ? 0x9fd4e8 : undefined);
}

function mkWindowOn(room) {
  // find a perimeter edge facing solid hull
  for (const c of room.cells) {
    const x = cellCX(c), z = cellCZ(c);
    const tries = [
      { n: c + 1, ok: (c % GW) < GW - 1, wx: x + 2.93, wz: z, ry: -Math.PI / 2 },
      { n: c - 1, ok: (c % GW) > 0, wx: x - 2.93, wz: z, ry: Math.PI / 2 },
      { n: c - GW, ok: c >= GW, wx: x, wz: z + 2.93, ry: Math.PI },
      { n: c + GW, ok: c < GW * (GH - 1), wx: x, wz: z - 2.93, ry: 0 },
    ];
    for (const t of tries) {
      if (t.ok && map[t.n] !== SOLID) continue;
      const wg = new THREE.Group();
      wg.position.set(t.wx, 1.55, t.wz); wg.rotation.y = t.ry;
      const isEye = RUN.deck >= 2 && rnd() < .18;
      const pane = new THREE.Mesh(new THREE.PlaneGeometry(3.6, 1.7),
        isEye ? new THREE.MeshBasicMaterial({ map: eyeCanvas() }) : starMat);
      wg.add(pane);
      for (const sy of [-.95, .95]) {
        const f = new THREE.Mesh(new THREE.BoxGeometry(4.0, .16, .14), accentMat);
        f.position.set(0, sy, .04); wg.add(f);
      }
      for (const sx of [-1.85, -.62, .62, 1.85]) {
        const mull = new THREE.Mesh(new THREE.BoxGeometry(.09, 2.0, .1), gunMetal);
        mull.position.set(sx, 0, .04); wg.add(mull);
      }
      scene.add(wg);
      if (isEye) WINDOWS.push({ kind: 'eye', mesh: pane, t: 0 });
      return;
    }
  }
}

const reactorRings = [];
let corePulse = null;
function dressRoom(r) {
  const inX = () => r.cx + rr(-(r.w * CELL / 2 - 1.6), r.w * CELL / 2 - 1.6);
  const inZ = () => r.cz + rr(-(r.h * CELL / 2 - 1.6), r.h * CELL / 2 - 1.6);
  switch (r.kind) {
    case 'start':
      mkLocker(r.cx + 1.8, r.cz - 1.5, Math.PI, 'starter');
      break;
    case 'exit':
      mkHatch(r.cx, r.cz, false);
      break;
    case 'cargo': {
      const n = 3 + (rnd() * 3 | 0);
      for (let i = 0; i < n; i++) mkCrate(inX(), inZ(), rr(.7, 1.15), rnd() < .5 ? 'common' : null);
      mkLocker(r.cx - r.w * 3 + .45, r.cz, Math.PI / 2, 'ammo');

        cot.position.set(r.cx + s * 1.7, .225, r.cz);
        scene.add(cot); pushCol(cot);
        blockBox(cot.position.x - .55, r.cz - 1.15, cot.position.x + .55, r.cz + 1.15);
      }
      mkCabinet(r.cx, r.cz - r.h * 3 + .2, 0, 'med');
      if (rnd() < .7) mkCabinet(r.cx + 2, r.cz - r.h * 3 + .2, 0, 'med');
      INTER.push({ x: r.cx - 2, z: r.cz - r.h * 3 + .4, kind: 'slate', label: 'READ SLATE', used: false });
      break;
    }
    case 'mess': {
      for (let i = 0; i < 2 + r.w; i++) {

      }
      mkLocker(r.cx, r.cz + r.h * 3 - .45, 0, 'common');
      break;
    }
    case 'lounge':
      mkWindowOn(r);
      for (const s of [-1, 1]) {
        const bz = r.cz + s * 1.8;
        const seat = new THREE.Mesh(new THREE.BoxGeometry(2.2, .12, .55), std({ color: 0x3a2e22, roughness: .8, map: woodTexK }));
        seat.position.set(r.cx, .46, bz); scene.add(seat); pushCol(seat);
        const base = new THREE.Mesh(new THREE.BoxGeometry(2.0, .4, .4), blackTrim);
        base.position.set(r.cx, .2, bz); scene.add(base);
        blockBox(r.cx - 1.15, bz - .35, r.cx + 1.15, bz + .35);
      }
      break;
    case 'engine': {
      const col = new THREE.Mesh(new THREE.CylinderGeometry(1.0, 1.15, H, 24), gunMetal);

      scene.add(col); pushCol(col);
      blockBox(r.cx - 1.2, r.cz - 1.2, r.cx + 1.2, r.cz + 1.2);

      });

      blockBox(r.cx - .9, altar.position.z - .5, r.cx + .9, altar.position.z + .5);
      for (let i = 0; i < 7; i++) { // candles: the crew made their own light

        const cnd = new THREE.Mesh(new THREE.CylinderGeometry(.025, .03, rr(.1, .28), 8),
          std({ color: 0xd8cdb4, roughness: .7 }));
        cnd.position.set(cx2, 1.0 + cnd.geometry.parameters.height / 2, cz2);
        scene.add(cnd);
        const fl = new THREE.Mesh(new THREE.SphereGeometry(.018, 6, 5),

        fl.position.set(cx2, cnd.position.y + cnd.geometry.parameters.height / 2 + .03, cz2);

        ANIMS.push((dt, t) => { fl.material.emissiveIntensity = 3 + Math.sin(t * 11 + cx2 * 9) * 1.2 + Math.random() * .6; });
      }
      const cl = new THREE.PointLight(0xffa040, 7, 7, 2);
      cl.position.set(r.cx, 1.6, altar.position.z + .6);
      scene.add(cl); LIGHTS.push({ l: cl, base: 7 });
      const nFig = 3 + (rnd() * 3 | 0);
      for (let i = 0; i < nFig; i++)

      mkWindowOn(r);

    }
    case 'static': {
      const n = 2 + (rnd() * 3 | 0);
      for (let i = 0; i < n; i++) {
        const scr = new THREE.Mesh(new THREE.PlaneGeometry(rr(1.2, 2.2), rr(.8, 1.4)), staticMat);
        const spot = wallSpots.length ? wallSpots[rnd() * wallSpots.length | 0] : null;
        // place on this room's own walls instead: pick a wall by cell
        const c = rpick(r.cells);
        const x = cellCX(c), z = cellCZ(c);
        const side = rpick([[2.85, 0, -Math.PI / 2], [-2.85, 0, Math.PI / 2], [0, 2.85, Math.PI], [0, -2.85, 0]]);

  // graffiti finds its room
  if ((r.kind === 'dark' || rnd() < .3) && wallSpots.length) {

      const t = i / d.length;

  const C = AU.ctx; if (!C || AU.muted) return;

    const dur = v.len * rand(.7, 1.3);
    if (v.kind === 'tonal') sTone(v.wave, f, f * v.gliss, dur, .09 * intensity, t, pan);
    else if (v.kind === 'click') { sTone('square', f * 3, f * 1.5, .025, .07 * intensity, t, pan); }

function rayEnts(org, d, maxD, pierce) {
  const hits = [];
  for (const e of entities) {
    if (e.dead || e.friendly) continue;
    const cx2 = e.x - org.x, cy2 = (e.y + e.hy) - org.y, cz2 = e.z - org.z;
    const tca = cx2 * d.x + cy2 * d.y + cz2 * d.z;
    if (tca < 0 || tca > maxD) continue;
    const d2 = cx2 * cx2 + cy2 * cy2 + cz2 * cz2 - tca * tca;
    if (d2 > e.r * e.r) continue;
    hits.push({ e, t: tca - Math.sqrt(Math.max(0, e.r * e.r - d2)) });
  }
  hits.sort((a, b) => a.t - b.t);
  return hits.slice(0, 1 + (pierce || 0));
}

function buildCreature(sp) {

    rnd() < .5 ? new THREE.SphereGeometry(.32 * S, 10, 8) : new THREE.BoxGeometry(.5 * S, torsoH, .42 * S),
    skin);

  torso.scale.y = rr(.8, 1.6);
  g.add(torso);
  refs.torso = torso;
  const headN = rnd() < .12 ? 2 : 1;
  for (let h = 0; h < headN; h++) {
    const head = new THREE.Mesh(new THREE.SphereGeometry(.16 * S, 10, 8), skin);
    head.position.set((h - (headN - 1) / 2) * .25 * S, coreY + torsoH * .8, .1 * S);
    head.scale.set(rr(.8, 1.3), rr(.8, 1.5), rr(.9, 1.6));
    g.add(head);
    refs.heads.push(head);
    for (let e = 0; e < sp.eyes; e++) {
      const eye = new THREE.Mesh(new THREE.SphereGeometry(.028 * S, 6, 5), eyeM);
      const a = (e - (sp.eyes - 1) / 2) * .45;
      eye.position.set(head.position.x + Math.sin(a) * .14 * S,
        head.position.y + (e % 2 ? .05 : -.01) * S,
        head.position.z + Math.cos(a) * .15 * S);

    }

  const legN = sp.body === 'biped' ? 2 : sp.body === 'quad' ? 4 : sp.body === 'crab' ? 6 : 0;
  for (let i = 0; i < legN; i++) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(.045 * S, .03 * S, coreY, 7), skin);
    const a = (i / legN) * TAU + .4;
    leg.position.set(Math.cos(a) * .22 * S, coreY / 2, Math.sin(a) * .18 * S);
    if (sp.body === 'crab') leg.rotation.z = Math.cos(a) * .7;
    g.add(leg);
    refs.legs.push(leg);
  }
  if (sp.body === 'biped') for (const s of [-1, 1]) {
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(.035 * S, .025 * S, .6 * S, 7), skin);
    arm.position.set(s * .3 * S, coreY + .1 * S, 0);
    arm.rotation.z = s * .3;
    g.add(arm);
    refs.arms.push(arm);
  }
  if (sp.body === 'serpent') {
    let py = coreY, pz = -.3 * S;
    for (let i = 0; i < 5; i++) {
      const seg = new THREE.Mesh(new THREE.SphereGeometry((.24 - i * .035) * S, 8, 7), skin);
      seg.position.set(0, py * (1 - i * .12), pz);
      pz -= .26 * S;
      g.add(seg);
      refs.fins.push(seg);
    }
  }
  if (sp.body === 'floater') for (let i = 0; i < 3; i++) {
    const fin = new THREE.Mesh(new THREE.ConeGeometry(.1 * S, .4 * S, 6), skin);
    const a = i / 3 * TAU;
    fin.position.set(Math.cos(a) * .3 * S, coreY, Math.sin(a) * .3 * S);
    fin.rotation.z = Math.PI / 2 + a;
    g.add(fin);
    refs.fins.push(fin);
  }
  g.userData = refs;
  return g;
}

  if (sp.loco === 'phase') {

const mapCv = document.createElement('canvas');

document.body.appendChild(mapCv);
let mapOpen = false;
const visitedHalls = new Set();
function drawMap() {
  const x = mapCv.getContext('2d');
  x.clearRect(0, 0, 400, 400);
  const S = 400 / GW;
  x.font = '10px monospace';
  for (let c = 0; c < GW * GH; c++) {
    if (map[c] === SOLID) continue;
    const known = player.schematic || (map[c] === HALL ? visitedHalls.has(c) : ROOMS[map[c]].visited);
    if (!known) continue;
    const gx = c % GW, gy = (c / GW) | 0;
    if (map[c] === HALL) {
      x.fillStyle = '#2e3338';
      x.fillRect(gx * S + S * .32, gy * S + S * .32, S * .36, S * .36);
    } else {
      const r = ROOMS[map[c]];
      x.fillStyle = r.kind === 'exit' ? '#3f6f5a' : r.kind === 'start' ? '#3a4452' :
        ['garden', 'archive', 'chapel', 'static', 'pool', 'dark'].includes(r.kind) ? '#54364a' : '#3c4046';
      x.fillRect(gx * S + 2, gy * S + 2, S - 4, S - 4);
    }
  }
  // doors
  x.fillStyle = '#5a626a';
  for (const k of openSet) {
    const a = (k / 1000) | 0, b = k % 1000;
    const ka = player.schematic || (map[a] === HALL ? visitedHalls.has(a) : map[a] !== SOLID && ROOMS[map[a]] && ROOMS[map[a]].visited);
    const kb = player.schematic || (map[b] === HALL ? visitedHalls.has(b) : map[b] !== SOLID && ROOMS[map[b]] && ROOMS[map[b]].visited);
    if (!ka || !kb) continue;
    const ax = (a % GW) * S + S / 2, ay = ((a / GW) | 0) * S + S / 2;
    const bx = (b % GW) * S + S / 2, by = ((b / GW) | 0) * S + S / 2;
    x.fillRect((ax + bx) / 2 - 2, (ay + by) / 2 - 2, 4, 4);
  }
  if (player.schematic || exitRoom.visited) {
    x.fillStyle = '#6affc2';
    x.fillText('⬇', (exitRoom.gx + exitRoom.w / 2) * S - 4, (exitRoom.gy + exitRoom.h / 2) * S + 4);
  }
  // you
  const pc = cellOf(camera.position.x, camera.position.z);
  if (pc >= 0) {
    const gx = pc % GW, gy = (pc / GW) | 0;
    x.fillStyle = '#ffb066';
    x.save();
    x.translate(gx * S + S / 2 + (camera.position.x - cellCX(pc)) / CELL * S,
      gy * S + S / 2 - (camera.position.z - cellCZ(pc)) / CELL * S);
    x.rotate(-yaw);
    x.beginPath(); x.moveTo(0, -6); x.lineTo(4, 5); x.lineTo(-4, 5); x.closePath(); x.fill();
    x.restore();
  }
  x.fillStyle = '#7c858d';
  x.fillText('SEED ' + RUN.seed + ' · DECK ' + RUN.deck, 8, 392);
}

const clock = new THREE.Clock();
let stepAcc = 0, flowT = 0, attract = 0, staticT = 0, heartT = 0;
function frame() {
  const dt = Math.min(clock.getDelta(), .05);
  const t = clock.elapsedTime;
  if (!locked && !player.dead) {
    attract += dt;
    tYaw = yaw = yaw + dt * .06;
    tPitch = pitch = Math.sin(attract * .3) * .04;
  } else if (locked) {
    const k = 1 - Math.exp(-dt * 22);
    yaw += (tYaw - yaw) * k;
    pitch += (tPitch - pitch) * k;
    const f = (keys.KeyW ? 1 : 0) - (keys.KeyS ? 1 : 0);
    const s = (keys.KeyD ? 1 : 0) - (keys.KeyA ? 1 : 0);
    player.sprint = (keys.ShiftLeft || keys.ShiftRight) && f > 0 && !player.ads;
    const speed = 3.0 * (player.sprint ? 1.8 : 1) * (player.ads ? .55 : 1);
    const dir = new THREE.Vector3(
      Math.sin(yaw) * -f + Math.cos(yaw) * s, 0,
      Math.cos(yaw) * -f - Math.sin(yaw) * s);
    if (dir.lengthSq() > 0) dir.normalize().multiplyScalar(speed);
    vel.lerp(dir, 1 - Math.exp(-dt * 9));
    const [nx, nz] = collideCircle(camera.position.x + vel.x * dt, camera.position.z + vel.z * dt, .28);
    camera.position.x = nx; camera.position.z = nz;
    if (keys.Space && player.grounded) { player.vy = 4.7; player.grounded = false; SFX.step(); }
    if (!player.grounded || player.y > 0) {
      player.vy -= 13.5 * gravMul * dt;
      player.y += player.vy * dt;
      if (player.y <= 0) {
        player.y = 0;
        if (player.vy < -3.5) { SFX.land(); camShake = Math.max(camShake, .12); }
        player.vy = 0; player.grounded = true;
      }
    }
    const sp = vel.length();
    if (player.grounded) {
      player.bob += dt * (4 + sp * 2.4) * Math.min(sp, 1);
      stepAcc += sp * dt;
      if (stepAcc > (player.sprint ? 2.4 : 2.0)) {
        stepAcc = 0; SFX.step();
        player.heat = Math.min(10, player.heat + (player.sprint ? .12 : .05));
      }
    }
    camera.position.y = 1.66 + player.y + Math.sin(player.bob) * .028 * Math.min(sp / 2.5, 1) * (player.grounded ? 1 : 0);
    player.fireCd -= dt;
    const w = curW();
    if (mouseDownL && player.fireCd <= 0 && (w.auto || !player.fireHeld)) fireWeapon();
    player.fireHeld = mouseDownL;
    if (player.reloadT > 0) { player.reloadT -= dt; if (player.reloadT <= 0) finishReload(); }
    // torch economy
    if (torchOn) {
      player.battery -= dt * 1.1;
      player.heat = Math.min(10, player.heat + dt * .04);
      if (player.battery <= 0) { player.battery = 0; setTorch(false); toast('THE TORCH GIVES UP'); }
      if ((t | 0) % 3 === 0) $('batf').style.width = Math.max(0, player.battery) + '%';
    }
    // heat draws things
    player.heat = Math.max(0, player.heat - dt * .25);
    if (player.heat >= 9.9) {
      player.heat = 2;
      const sp2 = rpick(SPECIES);
      const c = cellOf(camera.position.x, camera.position.z);
      const far = ROOMS.filter(r2 => r2 !== roomAt(camera.position.x, camera.position.z));
      if (far.length) {
        const r2 = rpick(far);
        const e = spawnEnt(sp2, r2.cx, r2.cz);
        e.state = 'hunt';
        toast('SOMETHING HEARD ALL OF THAT');
        SFX.clank(rand(-1, 1));
      }
    }
    // flow + rooms
    flowT -= dt;
    if (flowT <= 0) { flowT = .4; computeFlow(camera.position.x, camera.position.z); }
    const pc = cellOf(camera.position.x, camera.position.z);
    if (pc >= 0) {
      if (map[pc] === HALL) visitedHalls.add(pc);
      else if (map[pc] !== SOLID) {
        const r2 = ROOMS[map[pc]];
        if (!r2.visited) {
          r2.visited = true;
          if (['garden', 'archive', 'chapel', 'static', 'pool', 'dark'].includes(r2.kind)) {
            SFX.clank(rand(-.5, .5));
            toast(pick(['THIS ROOM IS NOT ON THE MANIFEST', 'THE AIR IS DIFFERENT HERE',
              'SOMEONE LOVED THIS ROOM ONCE', 'THE FLOOR REMEMBERS FEET']));
          }
        }
      }
    }
    // events
    evtT -= dt;
    if (evtT <= 0) {
      evtT = rand(15, 32) - Math.min(8, RUN.deck);
      pick(EVENTS)();
    }
    for (const e of entities.slice()) updateEnt(e, dt);
    updateProjectiles(dt);
    if (mapOpen) drawMap();
    // pool drips, static rooms
    const room = roomAt(camera.position.x, camera.position.z);
    if (room && room.kind === 'pool' && Math.random() < dt * .8) SFX.drip(rand(-1, 1));
    if (room && room.static) { staticT -= dt; if (staticT <= 0) { staticT = .07; rollStatic(); sNoise(.08, 'highpass', 4000, 3000, .012); } }
    // low health heartbeat
    if (player.hp < 30) { heartT -= dt; if (heartT <= 0) { heartT = .9; SFX.heartbeat(); } }
  }
  camera.rotation.set(0, 0, 0);
  camera.rotateY(yaw);
  camera.rotateX(pitch);
  camera.rotateZ(Math.sin(player.bob * .5) * .003);
  if (camShake > .002) {
    camera.rotateX(rand(-1, 1) * camShake * .03);
    camera.rotateZ(rand(-1, 1) * camShake * .02);
    camShake *= Math.exp(-dt * 6);
  }
  const wantFov = player.ads ? curW().zoom : (player.sprint ? 80 : 72);
  if (Math.abs(camera.fov - wantFov) > .2) {
    camera.fov = lerp(camera.fov, wantFov, 1 - Math.pow(.0001, dt));
    camera.updateProjectionMatrix();
  }
  vmKick = Math.max(0, vmKick - dt * 9);
  vmSwing = Math.max(0, vmSwing - dt * 4);
  const vx0 = player.ads ? .0 : .32, vy0 = player.ads ? -.225 : -.3, vz0 = player.ads ? -.42 : -.55;
  vm.position.set(
    lerp(vm.position.x, vx0 + Math.sin(player.bob * .5) * .012, 1 - Math.pow(.000001, dt)),
    vy0 + Math.abs(Math.sin(player.bob)) * .018 + vmKick * .04,
    vz0 + vmKick * .09);
  const yawD = clamp((yaw - lastYawVM) * 6, -.09, .09); lastYawVM = yaw;
  vmYawLag += (yawD - vmYawLag) * Math.min(1, dt * 10);
  vm.rotation.y = vmYawLag;
  vm.rotation.x = vmKick * .16 - vmSwing * 1.1 + vmYawLag * .15;
  vm.rotation.z = vmSwing * .5 - vmYawLag * .5;
  if (player.reloadT > 0)
    vm.rotation.x += Math.sin(clamp(player.reloadT / (curW().reload || 1), 0, 1) * Math.PI) * .7;
  if (locked) {
    const w2 = curW();
    const g2 = clamp((player.ads ? w2.adsSpread : w2.spread) * 900 + vmKick * 9 + (player.sprint ? 7 : 0) + 4, 4, 26);
    $('xh').style.setProperty('--g', g2.toFixed(1) + 'px');
    // interaction prompt
    let best = null, bd = 2.4;
    for (const it of INTER) {
      const d = Math.hypot(it.x - camera.position.x, it.z - camera.position.z);
      if (d < bd && !(it.kind === 'loot' && it.opened) && !it.used) { bd = d; best = it; }
    }
    $('prompt').style.opacity = best ? 1 : 0;
    if (best) $('prompt').innerHTML = `<b>E</b> — ${best.label}`;
  }
  // light moods
  lightMat.emissiveIntensity = 2.4 * lightsMul;
  hallLampMat.emissiveIntensity = 2.0 * lightsMul;
  for (const L2 of LIGHTS) L2.l.intensity = L2.base * lightsMul;
  if (corePulse) {
    const pulse = 1.6 + Math.sin(t * 2.1) * .7;
    corePulse.intensity = (6 + pulse * 3) * Math.max(.3, lightsMul);
    for (const r2 of reactorRings) r2.material.emissiveIntensity = pulse;
  }
  for (const wnd of WINDOWS) {
    if (wnd.kind === 'eye') {
      wnd.t += dt;
      wnd.mesh.scale.setScalar(1 + Math.sin(wnd.t * .6) * .015);
    }
  }
  $('dmg').style.opacity = Math.max(0, parseFloat($('dmg').style.opacity || 0) - dt * 1.2);
  muzzle.intensity = Math.max(0, muzzle.intensity - dt * 900);
  boomLight.intensity = Math.max(0, boomLight.intensity - dt * 1400);
  flashSpr.material.opacity = Math.max(0, flashSpr.material.opacity - dt * 16);
  for (const tr of tracers) if (tr.t > 0) { tr.t -= dt; tr.l.material.opacity = Math.max(0, tr.t / .08) * .9; }
  for (const h of holes) if (h.material.opacity > 0) h.material.opacity -= dt * .02;
  updateParticles(dt);
  updateShells(dt);
  updateRockets(dt);
  for (const fn of ANIMS) fn(dt, t);
  composer.render();
  requestAnimationFrame(frame);
}
computeFlow(camera.position.x, camera.position.z);
frame();

/* headless QA */
window.KQA = {
  lock() { locked = true; $('card').classList.add('gone');
    for (const id of ['wpn', 'xh', 'stat', 'bars']) $(id).classList.add('on'); },
  tp(x, z, y2, p2) { camera.position.set(x, 1.66, z); tYaw = yaw = y2 || 0; tPitch = pitch = p2 || 0; },
  god(v) { godMode = v !== false; },
  rooms: () => ROOMS.map(r => ({ kind: r.kind, x: r.cx, z: r.cz })),
  species: () => SPECIES.map(s => ({ name: s.name, body: s.body, loco: s.loco, quirk: s.quirk, attack: s.attack })),
  ents: () => entities.map(e => ({ n: e.sp.name, x: e.x | 0, z: e.z | 0, st: e.state, fr: !!e.friendly })),
  select: selectWeapon, fire() { mouseDownL = true; setTimeout(() => mouseDownL = false, 60); },
  interact, descend, map() { mapOpen = true; mapCv.style.display = 'block'; player.schematic = true; drawMap(); },
  give() { player.owned = player.owned.map(() => true); player.mags = WEAPONS.map(w => w.magSize); player.reserve = RESERVE_CAP.slice(); updateHUD(); },
};
</script>
