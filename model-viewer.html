<!doctype html><meta charset="utf-8"><title>model viewer</title><body style="margin:0">
<script type="module">
/* dev tool: ?m=path/to.glb&a=angleRadians — frames the model, logs its size */
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
const r=new THREE.WebGLRenderer({antialias:true});r.setSize(innerWidth,innerHeight);
r.toneMapping=THREE.ACESFilmicToneMapping;document.body.appendChild(r.domElement);
const sc=new THREE.Scene();sc.background=new THREE.Color(0x232a33);
const cam=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.01,200);  // far fixed per-model below
sc.add(new THREE.HemisphereLight(0xffffff,0x445566,1.3));
const dl=new THREE.DirectionalLight(0xfff0dd,2.6);dl.position.set(3,5,4);sc.add(dl);
const q=new URLSearchParams(location.search);
new GLTFLoader().load(q.get('m')||'assets/models/assault.glb',g=>{
  const o=g.scene;sc.add(o);
  o.traverse(n=>{if(n.isSkinnedMesh){n.skeleton.pose();n.frustumCulled=false;}}); // rest the bones
  if(g.animations.length&&q.get('anim')){ // or hold frame 0 of the first clip
    const mx=new THREE.AnimationMixer(o);const a2=mx.clipAction(g.animations[0]);
    a2.play();mx.update(0.001);window.__anim=g.animations.map(a3=>a3.name);
  }
  const box=new THREE.Box3().setFromObject(o),c=box.getCenter(new THREE.Vector3()),s=box.getSize(new THREE.Vector3());
  const d=Math.max(s.x,s.y,s.z),ang=+(q.get('a')||0);
  cam.position.set(c.x+Math.sin(ang)*d*1.3,c.y+d*.25,c.z+Math.cos(ang)*d*1.3);
  cam.near=d*.01;cam.far=d*10;cam.updateProjectionMatrix();cam.lookAt(c);window.__loaded=true;window.__size=s.toArray();
  console.log('size',s.toArray(),'center',c.toArray());
});
(function loop(){requestAnimationFrame(loop);r.render(sc,cam);})();
</script>
